stages:
  - docker-ros
  - compose-oci
  - consistency
  - docs

docker-ros:
  stage: docker-ros
  trigger:
    include:
      - remote: https://raw.githubusercontent.com/ika-rwth-aachen/docker-ros/main/.gitlab-ci/docker-ros.yml
    strategy: depend
  variables:
    PLATFORM: amd64,arm64
    TARGET: dev,run
    BASE_IMAGE: rwthika/ros2:jazzy
    ENABLE_RECURSIVE_VCS_IMPORT: 'false'
    RMW_IMPLEMENTATION: rmw_zenoh_cpp
    COMMAND: ros2 launch point_cloud_fusion point_cloud_fusion.launch.py
    CMAKE_ARGS: "-DCMAKE_BUILD_TYPE=Release -DCMAKE_CUDA_COMPILER=/usr/local/cuda/bin/nvcc -DREQUIRE_CUDA=ON"
    ADDITIONAL_SLIM_BUILD_ARGS: >-
      --preserve-path /usr/local/cuda-12.8/targets/x86_64-linux/lib/libcudart.so
      --preserve-path /usr/local/cuda-12.8/targets/x86_64-linux/lib/libcudart.so.12
      --preserve-path /usr/local/cuda-12.8/targets/x86_64-linux/lib/libcudart.so.12.8.90
    ENABLE_INDUSTRIAL_CI: 'false'
    TARGET_CMAKE_ARGS: '-DCMAKE_EXPORT_COMPILE_COMMANDS=1'

compose-oci:
  stage: compose-oci
  image: docker:28-cli
  rules:
    - if: '$CI_COMMIT_BRANCH || $CI_COMMIT_TAG'
      exists:
        - docker/compose/docker-compose.yml
  variables:
    COMPOSE_FILE: docker/compose/docker-compose.yml
    COMPOSE_IMAGE_NAME: $CI_REGISTRY_IMAGE
    COMPOSE_IMAGE_TAG: compose-$CI_COMMIT_REF_SLUG
    COMPOSE_REGISTRY: $CI_REGISTRY
    COMPOSE_REGISTRY_USER: $CI_REGISTRY_USER
    COMPOSE_REGISTRY_PASSWORD: $CI_REGISTRY_PASSWORD
  script:
    - test -f "$COMPOSE_FILE"
    - echo "$COMPOSE_REGISTRY_PASSWORD" | docker login "$COMPOSE_REGISTRY" -u "$COMPOSE_REGISTRY_USER" --password-stdin
    - docker compose -f "$COMPOSE_FILE" publish --yes "$COMPOSE_IMAGE_NAME:$COMPOSE_IMAGE_TAG"

consistency:
  stage: consistency
  needs: []
  image: python:3.12-bookworm
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
    CONSISTENCY_CHECKS_SKIP: "readme_generator_is_idempotent,compose_generator_is_idempotent"
  before_script:
    - apt-get update && apt-get install -y doxygen
    - python3 -m pip install -r .openads-dev-environment/scripts/requirements.txt
  script:
    - python3 .openads-dev-environment/scripts/check_repository_consistency.py --skip "$CONSISTENCY_CHECKS_SKIP"

pages:
  stage: docs
  image: ubuntu:24.04
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
    DOXYGEN_PROJECT_NAME: $CI_PROJECT_NAME
    DOXYGEN_PROJECT_NUMBER: $CI_COMMIT_TAG
  before_script:
    - apt-get update
    - DEBIAN_FRONTEND=noninteractive apt-get install -y ca-certificates doxygen git
    - git clone --depth 1 --branch v2.4.1 https://github.com/jothepro/doxygen-awesome-css.git doxygen-awesome-css
  script:
    - if [ -z "$DOXYGEN_PROJECT_NUMBER" ]; then export DOXYGEN_PROJECT_NUMBER="$CI_COMMIT_SHORT_SHA"; fi
    - doxygen .openads-dev-environment/Doxyfile
    - rm -rf public
    - mv docs/html public
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
